# sponsors.yaml — Jarvis v2 sponsor company registry.
#
# BUILD ONCE, REFRESH QUARTERLY. Source of truth for sponsorship:
#   USCIS H-1B Employer Data Hub (downloadable CSV) and DOL LCA disclosure
#   files. Do NOT scrape visa portals daily; this data changes quarterly.
#
# Every entry must be verified ONCE by opening the board URL:
#   greenhouse: boards.greenhouse.io/<token>
#   lever:      jobs.lever.co/<token>
#   ashby:      jobs.ashbyhq.com/<token>
#   workday:    <tenant>.<host>.myworkdayjobs.com/<site>
# Entries marked VERIFY are best-guess slugs. A wrong slug fails loudly
# in the run log; it never silently empties the list.
#
# type: direct | consultancy   (consultancies rank below direct in digest)

