# profile.yaml is GENERATED by the `setup_profile` tool from your resume —
# you normally never write it by hand. This file just documents the shape.
#
#   1. Put your resume at profile/resume_base.docx
#   2. Run the setup_profile tool (say "set up my profile" to Jarvis)
#   3. It derives the fields below from your resume and writes profile.yaml
#
# You MAY hand-tune title_include / title_exclude afterwards if you want finer
# control. The sponsor company list (sponsors.yaml) is separate and unchanged —
# this file only decides WHICH ROLES at those companies get matched.

target_role: Senior DevOps / SRE Engineer

# A job title must contain at least one of these (case-insensitive substring).
title_include:
  - sre
  - site reliability
  - devops
  - platform engineer
  - infrastructure engineer
  - cloud engineer

# A job title containing any of these is dropped (wrong level / wrong domain).
title_exclude:
  - intern
  - manager
  - director
  - principal architect

# Postings whose title/description require these are dropped (visa-ineligible).
eligibility_exclude:
  - security clearance
  - ts/sci
  - us citizenship required
  - itar

# Reject postings whose ATS timestamp is older than this many days.
max_age_days: 14
